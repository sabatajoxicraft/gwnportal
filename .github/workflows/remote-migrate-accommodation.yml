name: Remote Migrate - Accommodation

on:
  workflow_dispatch:

env:
  DEPLOY_HOST: student.joxicraft.co.za
  DEPLOY_PORT: 22
  DEPLOY_TARGET_DIR: /home/joxicaxs/student.joxicraft.co.za

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate migration filename and token
        run: |
          FILENAME="migrate_$(openssl rand -hex 8).php"
          TOKEN=$(openssl rand -hex 32)
          echo "::add-mask::$TOKEN"
          echo "MIGRATION_FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "MIGRATION_TOKEN=$TOKEN"  >> "$GITHUB_ENV"

      - name: Create PHP migration script
        run: |
          cat > "/tmp/${MIGRATION_FILENAME}" << 'PHPEOF'
          <?php
          $expected = 'TOKEN_PLACEHOLDER';
          $provided = $_GET['token'] ?? '';
          if (!hash_equals($expected, $provided)) {
              http_response_code(403);
              exit('Forbidden');
          }

          $configPaths = [__DIR__ . '/../includes/config.php', __DIR__ . '/includes/config.php'];
          $configLoaded = false;
          foreach ($configPaths as $_cp) {
              if (file_exists($_cp)) { require_once $_cp; $configLoaded = true; break; }
          }
          if (!$configLoaded) { http_response_code(500); exit('Config not found'); }

          if (!isset($conn)) {
              if (function_exists('getDbConnection')) {
                  $conn = getDbConnection();
              } else {
                  http_response_code(500);
                  exit('No database connection');
              }
          }

          $columns = [
              'address_line1' => 'VARCHAR(255) NULL',
              'address_line2' => 'VARCHAR(255) NULL',
              'city'          => 'VARCHAR(100) NULL',
              'province'      => 'VARCHAR(100) NULL',
              'postal_code'   => 'VARCHAR(20) NULL',
              'map_url'       => 'VARCHAR(500) NULL',
              'max_students'  => 'INT UNSIGNED NULL',
              'contact_phone' => 'VARCHAR(20) NULL',
              'contact_email' => 'VARCHAR(100) NULL',
              'notes'         => 'TEXT NULL',
          ];

          $added  = [];
          $errors = [];

          foreach ($columns as $col => $def) {
              $stmt = $conn->prepare(
                  "SELECT COUNT(*) FROM information_schema.COLUMNS
                   WHERE TABLE_SCHEMA = DATABASE()
                     AND TABLE_NAME   = 'accommodations'
                     AND COLUMN_NAME  = ?"
              );
              $stmt->bind_param('s', $col);
              $stmt->execute();
              $stmt->bind_result($cnt);
              $stmt->fetch();
              $stmt->close();

              if ((int)$cnt === 0) {
                  if (!$conn->query("ALTER TABLE `accommodations` ADD COLUMN `{$col}` {$def}")) {
                      $errors[] = "Add {$col}: " . $conn->error;
                  } else {
                      $added[] = $col;
                  }
              }
          }

          if (!$conn->query('ALTER TABLE `accommodations` MODIFY COLUMN `max_students` INT UNSIGNED NULL')) {
              $errors[] = 'Modify max_students: ' . $conn->error;
          }

          if ($errors) {
              http_response_code(500);
              echo 'ERRORS: ' . implode('; ', $errors);
          } else {
              $msg = $added ? 'Added: ' . implode(', ', $added) . '.' : 'No new columns needed.';
              echo 'OK. ' . $msg . ' max_students modified.';
          }
          PHPEOF
          sed -i "s|TOKEN_PLACEHOLDER|${MIGRATION_TOKEN}|" "/tmp/${MIGRATION_FILENAME}"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload migration script via SCP
        run: |
          # Upload into public/ if it exists on the remote, otherwise into the root target dir.
          if ssh -i ~/.ssh/id_deploy -p "$DEPLOY_PORT" -o BatchMode=yes \
               "${{ secrets.SSH_USERNAME }}@$DEPLOY_HOST" \
               "[ -d '${DEPLOY_TARGET_DIR}/public' ]"; then
            REMOTE_PATH="${DEPLOY_TARGET_DIR}/public/${MIGRATION_FILENAME}"
          else
            REMOTE_PATH="${DEPLOY_TARGET_DIR}/${MIGRATION_FILENAME}"
          fi
          echo "REMOTE_SCRIPT_PATH=${REMOTE_PATH}" >> "$GITHUB_ENV"
          scp -i ~/.ssh/id_deploy \
            -P "$DEPLOY_PORT" \
            -o BatchMode=yes \
            "/tmp/${MIGRATION_FILENAME}" \
            "${{ secrets.SSH_USERNAME }}@$DEPLOY_HOST:${REMOTE_PATH}"

      - name: Execute migration via HTTP
        run: |
          ROOT_STATUS=$(curl --silent --output /tmp/mig_root.txt --write-out "%{http_code}" \
            "https://student.joxicraft.co.za/${MIGRATION_FILENAME}?token=${MIGRATION_TOKEN}" || true)
          ROOT_STATUS=${ROOT_STATUS:-000}
          ROOT_BODY=$(cat /tmp/mig_root.txt 2>/dev/null || true)

          PUB_STATUS=$(curl --silent --output /tmp/mig_pub.txt --write-out "%{http_code}" \
            "https://student.joxicraft.co.za/public/${MIGRATION_FILENAME}?token=${MIGRATION_TOKEN}" || true)
          PUB_STATUS=${PUB_STATUS:-000}
          PUB_BODY=$(cat /tmp/mig_pub.txt 2>/dev/null || true)

          if { [ "$ROOT_STATUS" = "200" ] && ! echo "$ROOT_BODY" | grep -qi "error"; }; then
            echo "Migration succeeded."
          elif { [ "$PUB_STATUS" = "200" ] && ! echo "$PUB_BODY" | grep -qi "error"; }; then
            echo "Migration succeeded."
          else
            echo "Migration failed. Status root/public: ${ROOT_STATUS}/${PUB_STATUS}"
            exit 1
          fi

      - name: Cleanup remote migration script
        if: always()
        run: |
          if [ -n "${REMOTE_SCRIPT_PATH}" ]; then
            ssh -i ~/.ssh/id_deploy \
              -p "$DEPLOY_PORT" \
              -o BatchMode=yes \
              "${{ secrets.SSH_USERNAME }}@$DEPLOY_HOST" \
              "rm -f '${REMOTE_SCRIPT_PATH}'" || true
          fi
