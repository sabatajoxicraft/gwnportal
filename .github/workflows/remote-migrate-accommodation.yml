name: Remote Migrate - Accommodation

on:
  workflow_dispatch:

env:
  # Temporary workaround: ftp.joxicraft.co.za is the only reachable FTP endpoint,
  # but its FTPS certificate is issued to *.aserv.co.za/aserv.co.za (not the connect
  # hostname). Certificate validity is still verified; only hostname-checking is
  # disabled. Revert once the host cert matches or a correct endpoint is available.
  FTP_SERVER: ftp.joxicraft.co.za
  FTP_PORT: 21
  # Dedicated FTP account is rooted at the site directory, so '.' is the site root.
  FTP_SERVER_DIR: "."

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate migration filename and token
        run: |
          FILENAME="migrate_$(openssl rand -hex 8).php"
          TOKEN=$(openssl rand -hex 32)
          echo "::add-mask::$TOKEN"
          echo "MIGRATION_FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "MIGRATION_TOKEN=$TOKEN"  >> "$GITHUB_ENV"

      - name: Create PHP migration script
        run: |
          cat > "${GITHUB_WORKSPACE}/${MIGRATION_FILENAME}" << 'PHPEOF'
          <?php
          $expected = 'TOKEN_PLACEHOLDER';
          $provided = $_GET['token'] ?? '';
          if (!hash_equals($expected, $provided)) {
              http_response_code(403);
              exit('Forbidden');
          }

          $configPaths = [__DIR__ . '/../includes/config.php', __DIR__ . '/includes/config.php'];
          $configLoaded = false;
          foreach ($configPaths as $_cp) {
              if (file_exists($_cp)) { require_once $_cp; $configLoaded = true; break; }
          }
          if (!$configLoaded) { http_response_code(500); exit('Config not found'); }

          if (!isset($conn)) {
              if (function_exists('getDbConnection')) {
                  $conn = getDbConnection();
              } else {
                  http_response_code(500);
                  exit('No database connection');
              }
          }

          $columns = [
              'address_line1' => 'VARCHAR(255) NULL',
              'address_line2' => 'VARCHAR(255) NULL',
              'city'          => 'VARCHAR(100) NULL',
              'province'      => 'VARCHAR(100) NULL',
              'postal_code'   => 'VARCHAR(20) NULL',
              'map_url'       => 'VARCHAR(500) NULL',
              'max_students'  => 'INT UNSIGNED NULL',
              'contact_phone' => 'VARCHAR(20) NULL',
              'contact_email' => 'VARCHAR(100) NULL',
              'notes'         => 'TEXT NULL',
          ];

          $added  = [];
          $errors = [];

          foreach ($columns as $col => $def) {
              $stmt = $conn->prepare(
                  "SELECT COUNT(*) FROM information_schema.COLUMNS
                   WHERE TABLE_SCHEMA = DATABASE()
                     AND TABLE_NAME   = 'accommodations'
                     AND COLUMN_NAME  = ?"
              );
              $stmt->bind_param('s', $col);
              $stmt->execute();
              $stmt->bind_result($cnt);
              $stmt->fetch();
              $stmt->close();

              if ((int)$cnt === 0) {
                  if (!$conn->query("ALTER TABLE `accommodations` ADD COLUMN `{$col}` {$def}")) {
                      $errors[] = "Add {$col}: " . $conn->error;
                  } else {
                      $added[] = $col;
                  }
              }
          }

          if (!$conn->query('ALTER TABLE `accommodations` MODIFY COLUMN `max_students` INT UNSIGNED NULL')) {
              $errors[] = 'Modify max_students: ' . $conn->error;
          }

          if ($errors) {
              http_response_code(500);
              echo 'ERRORS: ' . implode('; ', $errors);
          } else {
              $msg = $added ? 'Added: ' . implode(', ', $added) . '.' : 'No new columns needed.';
              echo 'OK. ' . $msg . ' max_students modified.';
          }
          PHPEOF
          sed -i "s|TOKEN_PLACEHOLDER|${MIGRATION_TOKEN}|" "${GITHUB_WORKSPACE}/${MIGRATION_FILENAME}"

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload migration script via explicit FTPS
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "ERROR: FTP credentials are missing." >&2
            exit 1
          fi

          REMOTE_PATH="public/${MIGRATION_FILENAME}"
          echo "REMOTE_SCRIPT_PATH=${REMOTE_PATH}" >> "$GITHUB_ENV"

          _FTP_USER=$(printf '%s' "$FTP_USERNAME" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\$/\\$/g; s/`/\\`/g')
          _FTP_PASS=$(printf '%s' "$FTP_PASSWORD" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\$/\\$/g; s/`/\\`/g')

          LFTP_SCRIPT=$(mktemp -p "$RUNNER_TEMP" lftp_migrate_XXXXXX)
          chmod 600 "$LFTP_SCRIPT"
          trap 'rm -f "${LFTP_SCRIPT:-}"' EXIT
          cat > "$LFTP_SCRIPT" <<LFTP_EOF
          set cmd:fail-exit yes
          set ftp:ssl-allow yes
          set ftp:ssl-force yes
          set ftp:ssl-protect-data yes
          set ftp:passive-mode on
          set ftp:sync-mode on
          set ssl:verify-certificate yes
          set ssl:check-hostname no
          set net:timeout 120
          set net:max-retries 2
          set net:reconnect-interval-base 10
          set net:reconnect-interval-max 20
          open ftp://$FTP_SERVER:$FTP_PORT
          user "$_FTP_USER" "$_FTP_PASS"
          mkdir -f "public"
          put "${GITHUB_WORKSPACE}/${MIGRATION_FILENAME}" -o "$REMOTE_PATH"
          bye
          LFTP_EOF

          if ! lftp -f "$LFTP_SCRIPT"; then
            echo "ERROR: lftp upload failed; aborting before HTTP execution." >&2
            exit 1
          fi

      - name: Execute migration via HTTP
        run: |
          ROOT_STATUS=$(curl --silent --output "${GITHUB_WORKSPACE}/mig_root.txt" --write-out "%{http_code}" \
            "https://student.joxicraft.co.za/${MIGRATION_FILENAME}?token=${MIGRATION_TOKEN}" || true)
          ROOT_STATUS=${ROOT_STATUS:-000}
          ROOT_BODY=$(cat "${GITHUB_WORKSPACE}/mig_root.txt" 2>/dev/null || true)

          PUB_STATUS=$(curl --silent --output "${GITHUB_WORKSPACE}/mig_pub.txt" --write-out "%{http_code}" \
            "https://student.joxicraft.co.za/public/${MIGRATION_FILENAME}?token=${MIGRATION_TOKEN}" || true)
          PUB_STATUS=${PUB_STATUS:-000}
          PUB_BODY=$(cat "${GITHUB_WORKSPACE}/mig_pub.txt" 2>/dev/null || true)

          if { [ "$ROOT_STATUS" = "200" ] && ! echo "$ROOT_BODY" | grep -qi "error"; }; then
            echo "Migration succeeded."
          elif { [ "$PUB_STATUS" = "200" ] && ! echo "$PUB_BODY" | grep -qi "error"; }; then
            echo "Migration succeeded."
          else
            echo "Migration failed. Status root/public: ${ROOT_STATUS}/${PUB_STATUS}"
            exit 1
          fi

      - name: Cleanup remote migration script
        if: always()
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -n "${REMOTE_SCRIPT_PATH}" ] && [ -n "$FTP_USERNAME" ] && [ -n "$FTP_PASSWORD" ]; then
            _FTP_USER=$(printf '%s' "$FTP_USERNAME" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\$/\\$/g; s/`/\\`/g')
            _FTP_PASS=$(printf '%s' "$FTP_PASSWORD" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\$/\\$/g; s/`/\\`/g')

            LFTP_SCRIPT=$(mktemp -p "$RUNNER_TEMP" lftp_cleanup_XXXXXX)
            chmod 600 "$LFTP_SCRIPT"
            trap 'rm -f "${LFTP_SCRIPT:-}"' EXIT
            cat > "$LFTP_SCRIPT" <<LFTP_EOF
          set cmd:fail-exit yes
          set ftp:ssl-allow yes
          set ftp:ssl-force yes
          set ftp:ssl-protect-data yes
          set ftp:passive-mode on
          set ftp:sync-mode on
          set ssl:verify-certificate yes
          set ssl:check-hostname no
          set net:timeout 120
          set net:max-retries 1
          open ftp://$FTP_SERVER:$FTP_PORT
          user "$_FTP_USER" "$_FTP_PASS"
          rm "$REMOTE_SCRIPT_PATH"
          bye
          LFTP_EOF

            lftp -f "$LFTP_SCRIPT" || true
          fi

      - name: Cleanup local temp files
        if: always()
        run: |
          rm -f "${GITHUB_WORKSPACE}/${MIGRATION_FILENAME:-nonexistent_placeholder}"
          rm -f "${GITHUB_WORKSPACE}/mig_root.txt"
          rm -f "${GITHUB_WORKSPACE}/mig_pub.txt"
