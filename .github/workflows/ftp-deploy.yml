name: FTP Deploy to Joxicraft

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env from secret
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          if [ -z "$PRODUCTION_ENV_FILE" ]; then
            echo "ERROR: PRODUCTION_ENV_FILE secret is missing or empty. Aborting deploy." >&2
            exit 1
          fi
          printf '%s' "$PRODUCTION_ENV_FILE" > .env

      - name: Remove legacy env.production to avoid ambiguity
        run: rm -f env.production

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.joxicraft.co.za
          port: 21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          protocol: ftp
          dangerous-clean-slate: true
          exclude: |
            **/.git
            **/.git/**
            **/.vscode/**
            **/.copilot/**
            **/.github/**
