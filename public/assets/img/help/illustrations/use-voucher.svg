<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" font-family="Nunito,sans-serif">
  <rect width="480" height="260" rx="12" fill="#f0fff4"/>
  <!-- Phone device -->
  <rect x="30" y="30" width="100" height="180" rx="12" fill="#fff" stroke="#dee2e6" stroke-width="2"/>
  <rect x="30" y="30" width="100" height="16" rx="12" fill="#198754"/>
  <rect x="30" y="42" width="100" height="4" fill="#198754"/>
  <circle cx="80" cy="200" r="8" fill="#dee2e6"/>
  <!-- Phone screen: WiFi list -->
  <rect x="38" y="54" width="84" height="130" fill="#f8f9fa" rx="4"/>
  <text x="80" y="70" text-anchor="middle" font-size="7" fill="#495057" font-weight="700">WiFi Networks</text>
  <rect x="42" y="76" width="76" height="20" rx="3" fill="#cfe2ff" stroke="#9ec5fe" stroke-width="1"/>
  <text x="80" y="90" text-anchor="middle" font-size="7" fill="#0a58ca" font-weight="600">GWN_Portal ...</text>
  <rect x="42" y="100" width="76" height="20" rx="3" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="80" y="114" text-anchor="middle" font-size="7" fill="#6c757d">GWN_Free</text>
  <rect x="42" y="124" width="76" height="20" rx="3" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="80" y="138" text-anchor="middle" font-size="7" fill="#6c757d">Other_Network</text>
  <!-- Arrow right -->
  <path d="M148,130 L168,130" stroke="#198754" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#198754"/>
    </marker>
  </defs>
  <!-- Voucher entry screen -->
  <rect x="172" y="50" width="160" height="160" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="252" y="76" text-anchor="middle" font-size="11" fill="#212529" font-weight="700">Enter Voucher Code</text>
  <rect x="188" y="90" width="128" height="30" rx="4" fill="#f8f9fa" stroke="#0d6efd" stroke-width="2"/>
  <text x="252" y="110" text-anchor="middle" font-size="12" fill="#0d6efd" font-weight="700" letter-spacing="3">XXXX-YYYY</text>
  <rect x="188" y="130" width="128" height="28" rx="4" fill="#198754"/>
  <text x="252" y="149" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Connect</text>
  <text x="252" y="175" text-anchor="middle" font-size="9" fill="#6c757d">Code sent via SMS/WhatsApp</text>
  <text x="252" y="188" text-anchor="middle" font-size="9" fill="#6c757d">from your manager</text>
  <!-- Success state -->
  <rect x="350" y="80" width="110" height="100" rx="8" fill="#d1e7dd" stroke="#a3cfbb" stroke-width="1.5"/>
  <circle cx="405" cy="115" r="20" fill="#198754"/>
  <text x="405" y="121" text-anchor="middle" font-size="18" fill="#fff">&#10003;</text>
  <text x="405" y="150" text-anchor="middle" font-size="10" fill="#0f5132" font-weight="700">Connected!</text>
  <text x="405" y="164" text-anchor="middle" font-size="9" fill="#0f5132">WiFi active</text>
  <path d="M336" y="130 L350,130" stroke="#198754" stroke-width="2" marker-end="url(#arrowG2)"/>
  <line x1="336" y1="130" x2="350" y2="130" stroke="#198754" stroke-width="2"/>
  <defs>
    <marker id="arrowG2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#198754"/>
    </marker>
  </defs>
</svg>
