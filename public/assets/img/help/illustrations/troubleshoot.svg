<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" font-family="Nunito,sans-serif">
  <rect width="480" height="260" rx="12" fill="#fffbf0"/>
  <!-- Warning icon -->
  <polygon points="60,170 110,80 160,170" fill="#ffc107" stroke="#ffb300" stroke-width="2"/>
  <text x="110" y="152" text-anchor="middle" font-size="22" fill="#664d03" font-weight="900">!</text>
  <text x="110" y="198" text-anchor="middle" font-size="10" fill="#664d03">Troubleshooting</text>
  <!-- Checklist -->
  <rect x="190" y="20" width="272" height="224" rx="10" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="326" y="46" text-anchor="middle" font-size="12" fill="#664d03" font-weight="700">Quick-Fix Checklist</text>
  <!-- Items -->
  <rect x="206" y="56" width="12" height="12" rx="2" fill="#198754"/>
  <text x="214" y="66" text-anchor="middle" font-size="9" fill="#fff">&#10003;</text>
  <text x="228" y="66" font-size="10" fill="#212529">Voucher code entered correctly?</text>
  <rect x="206" y="78" width="12" height="12" rx="2" fill="#198754"/>
  <text x="214" y="88" text-anchor="middle" font-size="9" fill="#fff">&#10003;</text>
  <text x="228" y="88" font-size="10" fill="#212529">Connected to the right network?</text>
  <rect x="206" y="100" width="12" height="12" rx="2" fill="#ffc107"/>
  <text x="214" y="110" text-anchor="middle" font-size="9" fill="#664d03">?</text>
  <text x="228" y="110" font-size="10" fill="#212529">Device MAC registered?</text>
  <text x="228" y="122" font-size="8" fill="#6c757d">Settings > About > WiFi Address</text>
  <rect x="206" y="132" width="12" height="12" rx="2" fill="#ffc107"/>
  <text x="214" y="142" text-anchor="middle" font-size="9" fill="#664d03">?</text>
  <text x="228" y="142" font-size="10" fill="#212529">Voucher not yet approved?</text>
  <text x="228" y="154" font-size="8" fill="#6c757d">Check status on dashboard</text>
  <rect x="206" y="164" width="12" height="12" rx="2" fill="#dc3545"/>
  <text x="214" y="174" text-anchor="middle" font-size="9" fill="#fff">&#10005;</text>
  <text x="228" y="174" font-size="10" fill="#212529">Access blocked by manager?</text>
  <text x="228" y="186" font-size="8" fill="#6c757d">Contact your accommodation manager</text>
  <!-- Support button at bottom -->
  <rect x="206" y="204" width="240" height="28" rx="6" fill="#ffc107"/>
  <text x="326" y="222" text-anchor="middle" font-size="11" fill="#212529" font-weight="600">Still stuck? Contact Support</text>
</svg>
