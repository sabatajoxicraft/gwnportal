  <text x="60" y="228" font-size="10" fill="#0f5132" font-weight="600">Network: Online</text>
  <text x="180" y="228" font-size="9" fill="#0f5132">|  24 Mbps pool active  |  Router: Connected  |  All systems OK</text>
