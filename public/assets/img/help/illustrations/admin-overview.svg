  <text x="68" y="178" text-anchor="middle" font-size="9" fill="#495057">Manage Users</text>
  <rect x="128" y="128" width="96" height="60" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="176" y="152" text-anchor="middle" font-size="20">&#127968;</text>
  <text x="176" y="178" text-anchor="middle" font-size="9" fill="#495057">Accommodations</text>
  <rect x="236" y="128" width="96" height="60" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
