<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" font-family="Nunito,sans-serif">
  <rect width="480" height="260" rx="12" fill="#f5f0ff"/>
  <!-- Manager panel -->
  <rect x="20" y="20" width="220" height="220" rx="10" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <rect x="20" y="20" width="220" height="40" rx="10" fill="#6610f2"/>
  <rect x="20" y="48" width="220" height="12" fill="#6610f2"/>
  <text x="130" y="46" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Send Voucher</text>
  <!-- Student selector -->
  <text x="36" y="82" font-size="9" fill="#495057" font-weight="600">Select Student</text>
  <rect x="36" y="88" width="188" height="24" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="48" y="104" font-size="9" fill="#6c757d">John Doe (Rm 101)</text>
  <text x="210" y="104" font-size="12" fill="#6c757d">&#9660;</text>
  <!-- Voucher pool -->
  <text x="36" y="128" font-size="9" fill="#495057" font-weight="600">Available Vouchers</text>
  <rect x="36" y="134" width="188" height="24" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="48" y="150" font-size="9" fill="#6c757d">Pool: 24 Mbps - 48 unused</text>
  <text x="210" y="150" font-size="12" fill="#6c757d">&#9660;</text>
  <!-- Send button -->
  <rect x="36" y="170" width="188" height="30" rx="4" fill="#6610f2"/>
  <text x="130" y="190" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Send Voucher</text>
  <!-- Status indicator -->
  <rect x="36" y="214" width="188" height="14" rx="4" fill="#d1e7dd"/>
  <text x="130" y="224" text-anchor="middle" font-size="9" fill="#0f5132">Last sent: today at 09:42</text>
  <!-- History panel -->
  <rect x="258" y="20" width="202" height="220" rx="10" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <rect x="258" y="20" width="202" height="40" rx="10" fill="#6610f2"/>
  <rect x="258" y="48" width="202" height="12" fill="#6610f2"/>
  <text x="359" y="46" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Voucher History</text>
  <!-- Header row -->
  <rect x="266" y="62" width="186" height="18" rx="3" fill="#f3e8ff"/>
  <text x="274" y="74" font-size="8" fill="#6610f2" font-weight="700">Student</text>
  <text x="350" y="74" font-size="8" fill="#6610f2" font-weight="700">Date</text>
  <text x="418" y="74" font-size="8" fill="#6610f2" font-weight="700">Status</text>
  <!-- Rows -->
  <line x1="266" y1="82" x2="452" y2="82" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="274" y="94" font-size="8" fill="#212529">John D.</text>
  <text x="350" y="94" font-size="8" fill="#6c757d">2025-01-15</text>
  <rect x="416" y="85" width="34" height="12" rx="6" fill="#d1e7dd"/>
  <text x="433" y="94" text-anchor="middle" font-size="7" fill="#0f5132">Used</text>
  <line x1="266" y1="100" x2="452" y2="100" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="274" y="112" font-size="8" fill="#212529">Sara M.</text>
  <text x="350" y="112" font-size="8" fill="#6c757d">2025-01-15</text>
  <rect x="416" y="103" width="34" height="12" rx="6" fill="#cfe2ff"/>
  <text x="433" y="112" text-anchor="middle" font-size="7" fill="#0a58ca">Sent</text>
  <line x1="266" y1="118" x2="452" y2="118" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="274" y="130" font-size="8" fill="#212529">Ahmed K.</text>
  <text x="350" y="130" font-size="8" fill="#6c757d">2025-01-14</text>
  <rect x="416" y="121" width="34" height="12" rx="6" fill="#d1e7dd"/>
  <text x="433" y="130" text-anchor="middle" font-size="7" fill="#0f5132">Used</text>
  <line x1="266" y1="136" x2="452" y2="136" stroke="#dee2e6" stroke-width="0.5"/>
  <text x="274" y="148" font-size="8" fill="#212529">Priya N.</text>
  <text x="350" y="148" font-size="8" fill="#6c757d">2025-01-13</text>
  <rect x="416" y="139" width="34" height="12" rx="6" fill="#fff3cd"/>
  <text x="433" y="148" text-anchor="middle" font-size="7" fill="#664d03">Pending</text>
  <text x="359" y="185" text-anchor="middle" font-size="9" fill="#6c757d">+ more rows...</text>
  <!-- Export button -->
  <rect x="276" y="210" width="80" height="22" rx="4" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="316" y="224" text-anchor="middle" font-size="9" fill="#6610f2">Export CSV</text>
  <rect x="366" y="210" width="80" height="22" rx="4" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="406" y="224" text-anchor="middle" font-size="9" fill="#6610f2">Filter</text>
</svg>
