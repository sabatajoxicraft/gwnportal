<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" font-family="Nunito,sans-serif">
  <rect width="480" height="260" rx="12" fill="#fff8f0"/>
  <!-- Device icons -->
  <!-- Laptop -->
  <rect x="30" y="80" width="80" height="54" rx="4" fill="#fff" stroke="#dee2e6" stroke-width="2"/>
  <rect x="30" y="80" width="80" height="8" rx="4" fill="#fd7e14"/>
  <rect x="28" y="134" width="84" height="8" rx="3" fill="#dee2e6"/>
  <text x="70" y="116" text-anchor="middle" font-size="8" fill="#495057">Laptop / PC</text>
  <!-- Phone -->
  <rect x="140" y="80" width="54" height="90" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="2"/>
  <rect x="140" y="80" width="54" height="12" rx="8" fill="#fd7e14"/>
  <rect x="140" y="88" width="54" height="4" fill="#fd7e14"/>
  <circle cx="167" cy="162" r="5" fill="#dee2e6"/>
  <text x="167" y="136" text-anchor="middle" font-size="8" fill="#495057">Phone</text>
  <!-- MAC address box -->
  <rect x="220" y="60" width="240" height="150" rx="10" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="340" y="86" text-anchor="middle" font-size="12" fill="#fd7e14" font-weight="700">Register Your Device</text>
  <!-- MAC label field -->
  <text x="236" y="112" font-size="10" fill="#495057" font-weight="600">MAC Address</text>
  <rect x="236" y="118" width="208" height="26" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="246" y="135" font-size="9" fill="#adb5bd">e.g. AA:BB:CC:DD:EE:FF</text>
  <!-- Device name field -->
  <text x="236" y="158" font-size="10" fill="#495057" font-weight="600">Device Nickname</text>
  <rect x="236" y="164" width="208" height="26" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="246" y="181" font-size="9" fill="#adb5bd">e.g. My Laptop</text>
  <!-- Submit button -->
  <rect x="236" y="198" width="100" height="26" rx="4" fill="#fd7e14"/>
  <text x="286" y="215" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Add Device</text>
  <!-- Info badge -->
  <rect x="348" y="198" width="96" height="26" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="396" y="214" text-anchor="middle" font-size="9" fill="#664d03">Max 2 devices</text>
  <!-- Arrow from devices to form -->
  <line x1="196" y1="130" x2="218" y2="130" stroke="#fd7e14" stroke-width="2" marker-end="url(#arrowO)"/>
  <defs>
    <marker id="arrowO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fd7e14"/>
    </marker>
  </defs>
</svg>
