<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" font-family="Nunito,sans-serif">
  <!-- Background -->
  <rect width="480" height="260" rx="12" fill="#f8f9fa"/>
  <!-- Browser chrome -->
  <rect x="40" y="20" width="400" height="220" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5"/>
  <rect x="40" y="20" width="400" height="36" rx="8" fill="#e9ecef"/>
  <rect x="40" y="44" width="400" height="12" fill="#e9ecef"/>
  <circle cx="60" cy="38" r="6" fill="#f87171"/>
  <circle cx="80" cy="38" r="6" fill="#fbbf24"/>
  <circle cx="100" cy="38" r="6" fill="#34d399"/>
  <rect x="120" y="28" width="260" height="20" rx="4" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="250" y="42" text-anchor="middle" font-size="10" fill="#6c757d">portal.example.com/login</text>
  <!-- Login card -->
  <rect x="140" y="72" width="200" height="156" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <!-- Logo area -->
  <circle cx="240" cy="98" r="16" fill="#0d6efd"/>
  <text x="240" y="103" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">W</text>
  <text x="240" y="124" text-anchor="middle" font-size="11" fill="#212529" font-weight="700">Sign In</text>
  <!-- Username field -->
  <rect x="156" y="132" width="168" height="22" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="166" y="147" font-size="9" fill="#adb5bd">Student number / email</text>
  <!-- Password field -->
  <rect x="156" y="162" width="168" height="22" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="166" y="177" font-size="9" fill="#adb5bd">Password</text>
  <!-- Button -->
  <rect x="156" y="192" width="168" height="26" rx="4" fill="#0d6efd"/>
  <text x="240" y="209" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Login</text>
  <!-- Step callouts -->
  <circle cx="370" cy="148" r="14" fill="#0d6efd"/>
  <text x="370" y="153" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">1</text>
  <line x1="324" y1="143" x2="356" y2="148" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="370" cy="178" r="14" fill="#0d6efd"/>
  <text x="370" y="183" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">2</text>
  <line x1="324" y1="173" x2="356" y2="178" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="370" cy="208" r="14" fill="#198754"/>
  <text x="370" y="213" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">3</text>
  <line x1="324" y1="205" x2="356" y2="207" stroke="#198754" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="390" y="152" font-size="9" fill="#495057">Enter ID</text>
  <text x="390" y="182" font-size="9" fill="#495057">Password</text>
  <text x="390" y="212" font-size="9" fill="#198754">Login!</text>
</svg>
